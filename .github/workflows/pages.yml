# Build the Vite app and push static output to the gh-pages branch (peaceiris/actions-gh-pages).
#
# Secrets (Settings → Secrets and variables → Actions):
#   ARTIFACTORY_NPM_TOKEN     — required (JFrog npm token)
#   ARTIFACTORY_NPM_USERNAME  — optional (Artifactory email for Basic _auth)
#
# After first successful run: Settings → Pages → Build and deployment → Deploy from a branch
#   Branch: gh-pages, folder: / (root). See README.
#
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        env:
          ARTIFACTORY_NPM_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
          ARTIFACTORY_NPM_USERNAME: ${{ secrets.ARTIFACTORY_NPM_USERNAME }}
        run: |
          if [ -z "$ARTIFACTORY_NPM_TOKEN" ]; then
            echo "::error::Add repository secret ARTIFACTORY_NPM_TOKEN (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          REGISTRY_URL='https://usartifactorywexinc.jfrog.io/artifactory/api/npm/benefits-npm'
          AUTH_PREFIX='//usartifactorywexinc.jfrog.io/artifactory/api/npm/benefits-npm/'
          {
            echo 'registry=https://registry.npmjs.org/'
            echo "@wexinc-healthbenefits:registry=${REGISTRY_URL}/"
            if [ -n "${ARTIFACTORY_NPM_USERNAME:-}" ]; then
              AUTH=$(printf '%s:%s' "$ARTIFACTORY_NPM_USERNAME" "$ARTIFACTORY_NPM_TOKEN" | base64 -w0)
              echo "${AUTH_PREFIX}:_auth=${AUTH}"
              echo "${AUTH_PREFIX}:email=${ARTIFACTORY_NPM_USERNAME}"
            else
              printf '%s:_authToken=%s\n' "$AUTH_PREFIX" "$ARTIFACTORY_NPM_TOKEN"
            fi
            echo "${AUTH_PREFIX}:always-auth=true"
          } > .npmrc
          npm ci --ignore-scripts

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
